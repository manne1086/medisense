              "on-tertiary-container": "#8bf7e9",
              "secondary-fixed-dim": "#b7c9d5",
              "error-container": "#ffdad6",
              "surface-container-lowest": "#ffffff",
              "surface-variant": "#d3e4fe",
              "tertiary-fixed-dim": "#6bd8cb",
              "primary-fixed": "#dde1ff",
              "surface-container-high": "#dce9ff",
              "primary-container": "#0052ff",
              "inverse-primary": "#b7c4ff",
              "surface-container-low": "#eff4ff",
              "on-tertiary-fixed-variant": "#005049",
              "background": "#f8f9ff",
              "on-primary": "#ffffff",
              "on-primary-fixed": "#001452",
              "on-error": "#ffffff",
              "on-secondary-fixed": "#0c1e26",
              "on-tertiary": "#ffffff",
              "primary-fixed-dim": "#b7c4ff",
              "inverse-surface": "#213145",
              "error": "#ba1a1a",
              "outline-variant": "#c3c5d9",
              "tertiary": "#005851",
              "outline": "#737688",
              "on-secondary-container": "#566771",
              "on-surface": "#0b1c30",
              "on-primary-container": "#dfe3ff",
              "secondary-fixed": "#d3e5f1",
              "on-secondary": "#ffffff",
              "on-primary-fixed-variant": "#0038b6",
              "secondary-container": "#d3e5f1",

              "on-surface-variant": "#434656",
              "on-background": "#0b1c30",

              glass: "rgba(255, 255, 255, 0.25)",
              glassBorder: "rgba(255, 255, 255, 0.3)",
              danger: "#ef4444",
              warning: "#f59e0b",
              success: "#10b981",
              brandBlue: "#008AD1", 
            },
            borderRadius: {
              "DEFAULT": "1rem",
              "lg": "2rem",
              "xl": "3rem",
              "full": "9999px"
            },
            spacing: {
              "unit": "8px",
              "section-gap": "80px",
              "margin-x": "32px",
              "gutter": "24px",
              "container-max": "1280px"
            },
            fontFamily: {
              "h3": ["Epilogue"],
              "label-sm": ["Manrope"],
              "body-lg": ["Manrope"],
              "h1": ["Epilogue"],
              "h2": ["Epilogue"],

              sans: ['Inter', 'sans-serif'],
            },
            fontSize: {
              "h3": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
              "label-sm": ["13px", {"lineHeight": "1.0", "letterSpacing": "0.05em", "fontWeight": "600"}],

            },
            animation: {
              'float': 'float 6s ease-in-out infinite',
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },

            }

        },
      };
    </script>
    <style>
      body {
        background: #f8f9ff;
        min-height: 100vh;
        overflow-x: hidden;
      }
      .glass-panel {
        background: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.8);
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.4);
        box-shadow: 0 4px 24px rgba(0, 82, 255, 0.04);
      }
      .inner-highlight {
        border: 1px solid rgba(255, 255, 255, 0.8);
      }
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(24px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes slideInLeft {
        from { opacity: 0; transform: translateX(-20px); }
        to { opacity: 1; transform: translateX(0); }
      }
      @keyframes scaleIn {
        from { opacity: 0; transform: scale(0.9); }
        to { opacity: 1; transform: scale(1); }
      }
      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
      @keyframes progressPulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.6; }
      }
      @keyframes breathe {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      .animate-fadeInUp { animation: fadeInUp 0.6s ease-out both; }
      .animate-fadeIn { animation: fadeIn 0.5s ease-out both; }
      .animate-slideInLeft { animation: slideInLeft 0.5s ease-out both; }
      .animate-scaleIn { animation: scaleIn 0.4s ease-out both; }
      .animate-shimmer {
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
        background-size: 200% 100%;
        animation: shimmer 2s infinite;
      }
      .animate-breathe { animation: breathe 3s ease-in-out infinite; }
      .delay-100 { animation-delay: 0.1s; }
      .delay-200 { animation-delay: 0.2s; }
      .delay-300 { animation-delay: 0.3s; }
      .delay-400 { animation-delay: 0.4s; }
      .delay-500 { animation-delay: 0.5s; }
      .delay-600 { animation-delay: 0.6s; }
      .delay-700 { animation-delay: 0.7s; }
      .delay-800 { animation-delay: 0.8s; }
    </style>

}
</script>
